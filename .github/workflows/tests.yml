---
defaults:
  run:
    shell: bash

name: Tests
run-name: Run tests for ${{ github.ref_name }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests
  cancel-in-progress: true

on:
  push:
    branches:
      # - main # runs via ci.yml, so we can run lint on dev only here
      - dev
  pull_request:
    branches:
      # - main # runs via ci.yml, so we can run lint on dev only here
      - dev
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Test Run (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098

      - run: uv tool install tox --with tox-uv --with tox-gh-actions

      - run: tox

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' &&  matrix.python-version == '3.12'}}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
