---
# Install pre-commit hooks via
# pre-commit install
ci:
  autoupdate_schedule: 'quarterly'
  autoupdate_commit_msg: 'chore: update pre-commit hooks (Automatically generated by pre-commit.ci)'
  autofix_prs: true
  autofix_commit_msg: "style: pre-commit fixes (Automatically generated by pre-commit.ci)"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: debug-statements
      - id: check-ast
      - id: mixed-line-ending
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: "v1.10.0"
    hooks:
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.37.0"
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
      - id: check-github-actions
      - id: check-github-issue-config
      - id: check-github-issue-forms
      - id: check-readthedocs
      - id: check-codecov

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.5
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--config=pyproject.toml, --fix, --show-fixes, --exit-non-zero-on-fix]
      # Run the formatter.
      - id: ruff-format
        args: [--config=pyproject.toml]

  - repo: https://github.com/scientific-python/cookie
    rev: 2026.03.02
    hooks:
      - id: sp-repo-review

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        name: Validate pyproject.toml
        additional_dependencies: ["validate-pyproject-schema-store[all]"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        additional_dependencies:
          - sphinx>=1.8.1
          - myst-parser

  - repo: https://github.com/numpy/numpydoc
    rev: v1.10.0
    hooks:
      - id: numpydoc-validation
        exclude: demo.py

  - repo: https://github.com/adamchainz/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black==22.12.0

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["--strict", "--config-file=.yamllint.yaml"]

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0  # Use the ref you want to point at
    hooks:
      - id: mdformat
        # Optionally add plugins
        additional_dependencies:
          - mdformat-gfm
          - mdformat-beautysh
          - mdformat-ruff
          - ruff

  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: "1.7.1"
    hooks:
      - id: tox-ini-fmt

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        files: ^.*\.(py|c|cpp|h|m|md|rst|yml|yaml)$
        exclude: |
          (?x)^(
          CODE_OF_CONDUCT
          )

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml", "src/pytermite"]
        files: src/pytermite  # Only run when files in src/pytermite are changed.
        pass_filenames: false
