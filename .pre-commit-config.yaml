---
# Install pre-commit hooks via
# pre-commit install
ci:
  autofix_prs: true
  autoupdate_schedule: 'quarterly'
  autoupdate_commit_msg: 'chore: pre-commit autoupdate (Automatically generated by pre-commit.ci)'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: debug-statements
      - id: check-ast
      - id: mixed-line-ending
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.4
    hooks:
      # Run the linter.
      - id: ruff
        args: [--config=pyproject.toml, --fix, --show-fixes, --exit-non-zero-on-fix]
      # Run the formatter.
      - id: ruff-format
        args: [--config=pyproject.toml]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject
        name: Validate pyproject.toml

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.4
    hooks:
      - id: rstcheck
        additional_dependencies:
          - sphinx>=1.8.1
          - myst-parser

  - repo: https://github.com/numpy/numpydoc
    rev: v1.10.0
    hooks:
      - id: numpydoc-validation
        exclude: demo.py

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: ["--strict", "--config-file=.yamllint.yaml"]

  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: "1.7.1"
    hooks:
      - id: tox-ini-fmt

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        files: ^.*\.(py|c|cpp|h|m|md|rst|yml|yaml)$
        exclude: |
          (?x)^(
          CODE_OF_CONDUCT
          )

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.1
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml", "src/pytermite"]
        files: src/pytermite  # Only run when files in src/pytermite are changed.
        pass_filenames: false
