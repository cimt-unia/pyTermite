---
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - pip install -U pip  # Official recommended way
      - pip install . --group docs  # Install the package and its docs dependencies
    post_checkout:
      # Avoid setuptools-scm dirty Git index issues
      - git update-index --assume-unchanged environment.yml docs/conf.py

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
